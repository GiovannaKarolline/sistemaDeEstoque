server:
  port: 8081

spring:
  application:
    name: produto-service

  # H2 in-memory — Banco de dados próprio deste serviço (Martin Fowler: Decentralized Data Management)
  datasource:
    url: jdbc:h2:mem:produtodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

# Resilience4j — Circuit Breaker para API externa (Susan Fowler: Confiabilidade)
resilience4j:
  circuitbreaker:
    instances:
      awesomeApi:
        # Abre o circuito após 50% de falhas nas últimas 5 chamadas
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        # Aguarda 10s antes de tentar novamente
        wait-duration-in-open-state: 10s
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        # Permite 2 chamadas no estado HALF_OPEN
        permitted-number-of-calls-in-half-open-state: 2

# Spring Boot Actuator (Susan Fowler: Estabilidade e Monitoramento)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# Documentação OpenAPI (Susan Fowler: Documentação)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    br.edu.inventory: DEBUG
    org.hibernate.SQL: WARN
