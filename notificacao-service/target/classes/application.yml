server:
  port: 8083

spring:
  application:
    name: notificacao-service

  datasource:
    url: jdbc:h2:mem:notificacaodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # Conecta ao broker embutido no Estoque Service
  artemis:
    mode: native
    broker-url: tcp://localhost:61616

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    br.edu.inventory: DEBUG
